<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonalQ — Sign In</title>
  <link rel="stylesheet" href="css/style.css?v=10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="bg-glow"></div>

  <!-- LOGIN CARD -->
  <div class="auth-wrapper" id="login-card">
    <div class="auth-brand">
      <div class="auth-brand-text">PersonalQ</div>
    </div>
    <div class="auth-card">
      <h2>Sign in</h2>
      <p class="auth-sub">Enter your credentials to continue</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="auth-input-group">
          <label>Email or Phone</label>
          <input class="auth-input" type="text" id="login-identifier" placeholder="you@example.com" required />
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <div style="position:relative">
            <input class="auth-input" type="password" id="login-password" placeholder="••••••••" required />
            <span class="toggle-pw" onclick="togglePassword('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim);cursor:pointer;font-weight:600">Show</span>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="login-btn">Sign In</button>
        <p id="login-error" class="error-msg" style="color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center"></p>
      </form>

      <div class="auth-divider"><span>OR</span></div>

      <div class="auth-social-row">
        <button type="button" class="auth-social-btn" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button type="button" class="auth-social-btn" onclick="signInWithX()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          X
        </button>
      </div>

      <p class="auth-toggle">Don't have an account? <a href="#" onclick="showCard('register')">Create one</a></p>
    </div>
  </div>

  <!-- REGISTER CARD -->
  <div class="auth-wrapper hidden" id="register-card">
    <div class="auth-brand">
      <div class="auth-brand-text">PersonalQ</div>
    </div>
    <div class="auth-card">
      <h2>Create account</h2>
      <p class="auth-sub">Join PersonalQ and start tracking</p>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="auth-input-group">
          <label>Full Name</label>
          <input class="auth-input" type="text" id="reg-name" placeholder="Your full name" required />
        </div>
        <div class="auth-input-group">
          <label>Email or Phone</label>
          <input class="auth-input" type="text" id="reg-identifier" placeholder="email@example.com or +1234567890" required />
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <div style="position:relative">
            <input class="auth-input" type="password" id="reg-password" placeholder="Choose a password" required minlength="6" />
            <span class="toggle-pw" onclick="togglePassword('reg-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim);cursor:pointer;font-weight:600">Show</span>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="reg-btn">Send Verification Code</button>
        <p id="reg-error" class="error-msg" style="color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center"></p>
      </form>

      <p class="auth-toggle">Already have an account? <a href="#" onclick="showCard('login')">Sign in</a></p>
    </div>
  </div>

  <!-- OTP CARD -->
  <div class="auth-wrapper hidden" id="otp-card">
    <div class="auth-brand">
      <div class="auth-brand-text">PersonalQ</div>
    </div>
    <div class="auth-card">
      <h2>Enter your code</h2>
      <p class="auth-sub" id="otp-subtitle">A 6-digit code was sent to you</p>

      <form id="otp-form" onsubmit="handleOTP(event)">
        <div class="auth-input-group">
          <label>Verification Code</label>
          <input class="auth-input" type="text" id="otp-code" placeholder="123456" maxlength="6" inputmode="numeric" required />
        </div>
        <button type="submit" class="auth-submit" id="otp-btn">Verify & Create Account</button>
        <button type="button" class="auth-social-btn" onclick="resendCode()" style="width:100%;margin-top:10px">Resend code</button>
        <p id="otp-error" class="error-msg" style="color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center"></p>
      </form>
    </div>
  </div>

  <script src="js/auth.js?v=4"></script>
  <script src="js/jitter.js"></script>
</body>
</html>
